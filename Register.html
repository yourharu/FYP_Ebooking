<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>SIGN UP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/USER PAGE/style_index.css">
</head>
<body>
    <div class="roblox-card text-uppercase">
        <h2 class="font-bungee text-center mb-4 text-dark">SIGN UP</h2>
        <label class="fw-bold small">USERNAME :</label>
        <input type="text" class="form-control mb-3" placeholder="FULLNAME">
        <label class="fw-bold small">IC NUMBER :</label>
        <input type="text" class="form-control mb-3" placeholder="IC NUMBER">
        <label class="fw-bold small">EMAIL :</label>
        <input type="email" class="form-control mb-3" placeholder="EMAIL">
        <label class="fw-bold small">CREATE PASSWORD :</label>
        <input type="password" class="form-control mb-3" placeholder="PASSWORD">
        <button class="btn btn-roblox btn-success w-100 py-2 fs-5 mb-3" onclick="alert('Account Created!'); window.location.href='index.html'">DONE</button>
        <button class="btn btn-link w-100 text-danger fw-bold text-decoration-none" onclick="window.location.href='index.html'">CANCEL</button>
    </div>
</body>
</html>
