<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>HOME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_index.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4 p-3 shadow">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee" href="#"><i class="bi bi-house-door-fill"></i>HOME DASHBOARD</a>
            <button class="btn btn-danger btn-sm font-bungee border-2 border-white" onclick="window.location.href='index.html'">LOG OUT</button>
        </div>
    </nav>

    <div class="container text-center">
        <div class="roblox-card w-100 mt-0" style="max-width: 800px; margin: auto;">
            <h1 class="font-bungee text-dark">WELCOME BACK, <span id="userDisp">PLAYER</span>!</h1>
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Isma" class="my-4" style="width: 150px; border: 5px solid var(--roblox-dark);">
            
            <div class="row g-3 text-uppercase">
                <div class="col-md-6">
                    <div class="btn-roblox card p-3 border-4 border-dark shadow">
                        <h4 class="font-bungee">MY STATUS</h4>
                        <p class="fw-bold text-success"><i class="bi bi-check-circle"></i> ACTIVE PLAYER</p>
                    </div>
                </div>

                <!--PENDING CHECK-IN-->
    <div class="col-md-6">
        <div class="btn-roblox card p-4 border-4 border-dark shadow" id="checkInBox" style="background: white; transition: 0.3s;" onclick="window.location.href='check_in.html'">
           <h4 class=" font-bungee">PENDING CHECK-IN</h4>
             <!-- Jika ada tempahan: Warna Oren/Kuning. Jika tiada: Warna Kelabu -->
              <p class="fw-bold mb-0" id="checkInStatus" style="color: #ff8f00;">
             <i class="bi bi-exclamation-triangle-fill"></i> 1 ROOM WAITING
            </p>
        </div>
    </div>
    </div>

            <button class="btn btn-roblox btn-success w-100 py-3 mt-4 fs-3 text-white" onclick="window.location.href='room_selection.html'">
                <i class="bi bi-calendar-check"></i> GO TO BOOKING SYSTEM
            </button>
        </div>
    </div>

    <script>
        document.getElementById('userDisp').innerText = localStorage.getItem('currentUser') || 'USER';
   
        // check kalau user ada booking yang belum check-in
        const hasPendingBooking = true; // Tukar jadi false kalau nak tengok rupa bila tiada booking

        const statusElement = document.getElementById('checkInStatus');
        const timerElement = document.getElementById('checkInTimer');
        const boxElement = document.getElementById('checkInBox');

        if (hasPendingBooking) {
        // Rupa paras bila ada misi kena check-in
       statusElement.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> DFK 1 WAITING';
       timerElement.innerText = "14:59 MINUTES LEFT";
       boxElement.style.backgroundColor = "#fff3cd"; // Warna kuning amaran
    
    // effect berkelip seperti amaran
        boxElement.classList.add('animate-pulse');
        } else {
    // Rupa paras bila semua setel
       statusElement.innerHTML = '<i class="bi bi-check-circle-fill"></i> NO PENDING';
       statusElement.style.color = "#198754"; // Warna hijau success
       timerElement.innerText = "ALL MISSIONS COMPLETED";
       boxElement.style.backgroundColor = "white";
        }
   </script>
</body>
</html>
