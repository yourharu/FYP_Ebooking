<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>LOG IN | ROBLO-BOOK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_index.css">
    
    <!-- 1. TAPAK UTAMA: Masukkan Supabase CDN ke dalam HTML -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="roblox-card text-center text-uppercase">
        <div class="avatar-frame shadow">
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Isma" style="width: 100%;">
        </div>
        <h2 class="font-bungee mb-1">LOG IN</h2>
        <p class="small text-muted mb-4 fw-bold">MY TVETMARA e-BOOKING</p>
        
        <div class="text-start mb-3">
            <label class="fw-bold small">EMAIL :</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="EMAIL">
        </div>
        <div class="text-start mb-4">
            <label class="fw-bold small">PASSWORD:</label>
            <input type="password" id="loginPass" class="form-control" placeholder="PASSWORD">
        </div>
        
        <!-- Butang LET'S GO! memanggil fungsi doLogin() di bawah -->
        <button class="btn btn-roblox btn-success w-100 py-3 fs-3 text-white mb-3" onclick="doLogin()">LET'S GO!</button>
        <button class="btn btn-roblox btn-primary w-100 py-2" onclick="window.location.href='register.html'">SIGN UP</button>
    </div>

    <!-- 2. LOGIK BACKEND: Kod sambungan login Supabase -->
    <script>
        // Masukkan URL dan Kunci Supabase Projek Awak (Sama seperti dalam register.html)
        const supabaseUrl = 'https://doyyrhhscdpchuvpancq.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRveXlyaGhzY2RwY2h1dnBhbmNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjkzNjksImV4cCI6MjA5NTIwNTM2OX0.liPsexqKQTnZe5UpB1DW5zpZ12I05REflxYaNbf6l8A';
        
        // Inisialisasi sambungan
        const _supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function doLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            // Pastikan pengguna isi kedua-dua ruangan
            if (!email || !password) {
                alert("PLEASE ENTER BOTH EMAIL AND PASSWORD!");
                return;
            }
            
            // A. PROSES LOGIN KE SUPABASE AUTH
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("Login Gagal: " + error.message);
                console.error(error);
            } else {
                // Ambil username sebenar yang kita simpan semasa pendaftaran (signUp)
                const registeredUsername = data.user.user_metadata.username || "USER";
                
                // Simpan data penting ke dalam localStorage komputer untuk kegunaan halaman lain
                localStorage.setItem('currentUser', registeredUsername.toUpperCase());
                localStorage.setItem('currentUserId', data.user.id); // Simpan UUID pengguna untuk buat booking nanti
                
                alert("Welcome Back, " + registeredUsername.toUpperCase() + "!");
                window.location.href = 'home.html'; // Bawa ke halaman Dashboard Utama
            }
        }
    </script>
</body>
</html>
