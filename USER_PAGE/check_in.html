<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>CHECK IN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_index.css">
    <style>
        body { 
            background-color: #1b1d1e; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Kotak Bingkai Utama (Macam UI Roblox) */
        .main-quest-box {
            background-color: #ffffff;
            border: 8px solid #393B3D;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
            padding: 0;
            overflow: hidden;
        }

        .quest-header-blue {
            background-color: var(--roblox-blue);
            color: white;
            padding: 15px;
            border-bottom: 6px solid #393B3D;
            text-align: center;
        }

        /* Senarai di dalam box */
        .quest-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 4px solid #eeeeee;
            transition: 0.2s;
        }

        .quest-item:hover {
            background-color: #f8f9fa;
        }

        .quest-item:last-child {
            border-bottom: none;
        }

        .quest-icon-frame {
            width: 60px;
            height: 60px;
            background: #f0f0f0;
            border: 3px solid #393B3D;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 20px;
        }

        .quest-info {
            flex-grow: 1;
        }

        .quest-status-btn {
            min-width: 150px;
        }

        .timer-flash {
            color: var(--roblox-red);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3 shadow">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee text-white" href="#"><i class="bi bi-list-task"></i> SYSTEM MENU</a>
            <button class="btn btn-primary btn-sm font-bungee border-2 border-white" onclick="window.location.href='home.html'">BACK TO LOBBY</button>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="main-quest-box">
            
            <!-- Header Box -->
            <div class="quest-header-blue">
                <h2 class="font-bungee mb-0">BOOKING PENDING</h2>
            </div>

            <!-- Senarai Item Dalam Box -->
            <div class="quest-list-container">
                
                <!-- CONTOH MISI AKTIF -->
                <div class="quest-item">
                    <div class="quest-icon-frame">
                        <i class="bi bi-box-fill text-primary"></i>
                    </div>
                    <div class="quest-info">
                        <h4 class="font-bungee mb-0">ROOM DFK 1</h4>
                        <p class="mb-0 small fw-bold text-muted">SUBJECT: CLOUD COMPUTING</p>
                        <p class="mb-0 small text-uppercase">Starts: <span class="text-dark">08:15 AM</span></p>
                    </div>
                    <div class="quest-action text-end">
                        <div class="timer-flash small mb-1">12:45 LEFT</div>
                        <button class="btn btn-roblox btn-success quest-status-btn" onclick="confirmCheckIn('DFK 1')">CHECK IN</button>
                    </div>
                </div>

                <!-- CONTOH MISI AKAN DATANG -->
                <div class="quest-item opacity-75 bg-light">
                    <div class="quest-icon-frame">
                        <i class="bi bi-lock-fill text-muted"></i>
                    </div>
                    <div class="quest-info">
                        <h4 class="font-bungee mb-0 text-muted">ROOM DFK 3</h4>
                        <p class="mb-0 small fw-bold text-muted text-uppercase">Starts at: 02:00 PM</p>
                    </div>
                    <div class="quest-action">
                        <button class="btn btn-roblox btn-dark quest-status-btn" disabled>LOCKED</button>
                    </div>
                </div>


            <!-- Footer Box -->
            <div class="p-3 bg-light text-center border-top border-3">
                <small class="fw-bold text-muted uppercase">PLEASE COMPLETE YOUR BOOKINGS TO AVOID TERMINATION.</small>
            </div>

        </div> 
    </div>

    <script>
        function confirmCheckIn(room) {
            alert("MISSION COMPLETE! You have joined " + room);
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
