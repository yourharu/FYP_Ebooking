<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFK 1</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Link ke fail CSS yang sama -->
    <link rel="stylesheet" href="style_index.css">
</head>
<body style="background-color: #e0e0e0;">

    <nav class="navbar navbar-dark mb-4 p-3 shadow">
        <div class="container text-uppercase">
            <a class="navbar-brand font-bungee" href="#"><i class="bi bi-box-seam-fill"></i> TVETMARA BESUT e-BOOKING</a>
            <div class="d-flex align-items-center text-white fw-bold">
                <a href="room_selection.html" class="btn btn-primary btn-sm ms-3 font-bungee border-2 border-white">BACK</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5 text-uppercase">
        <!-- Info Card -->
        <div class="card p-4 bg-white mb-4 border-4 border-dark shadow">
            <div class="row align-items-center mb-3">
                <div class="col-md-8 text-center text-md-start">
                    <h2 class="font-bungee text-dark mb-1">ROOM DFK 6</h2>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-2">
                <span class="btn btn-roblox bg-warning text-white border-2 border-dark p-2">20 CHAIR</span>
                <span class="btn btn-roblox bg-info text-white border-2 border-dark p-2">20 TABLE</span>
                <span class="btn btn-roblox bg-primary text-white border-2 border-dark p-2" style="background-color: #6f42c1 !important;">20 COMPUTER</span>
                <button class="btn btn-roblox btn-success btn-sm ms-md-2" onclick="showRoomPhoto()">
                    <i class="bi bi-camera-fill"></i> PHOTO
                </button>
            </div>
        </div>

        <!-- JADUAL LANDSCAPE -->
        <div class="card bg-dark p-0 overflow-hidden border-4 border-dark shadow">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead class="bg-dark text-white text-center">
                        <tr>
                            <th class="sticky-col py-3" style="min-width: 125px;">DATE/TIME</th>
                            <script>
                                const times = ["8:15 AM", "9:15 AM", "10:15 AM", "10:45 AM", "11:45 AM", "12:45 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"];
                                times.forEach(t => document.write(`<th class="py-3">${t}</th>`));
                            </script>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <script>
                            const days = ["SUNDAY", "MONDAY", "TEUSDAY", "WEDNESDAY", "THURSDAY"];
                            days.forEach(day => {
                                document.write(`<tr>`);
                                document.write(`<td class="sticky-col fw-bold text-center border-2 border-dark ">${day}</td>`);
                                times.forEach(time => {
                                    document.write(`<td class="timetable-slot slot-available btn-roblox" 
                                        id="${day}-${time.replace(/[: ]/g, '')}" 
                                        data-day="${day}" 
                                        data-time="${time}" 
                                        onclick="handleSlotClick('${day}', '${time}')">AVAILABLE</td>`);
                                });
                                document.write(`</tr>`);
                            });
                        </script>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL 1: GAMBAR BILIK -->
    <div class="modal fade" id="photoModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-success text-white border-0"><h5 class="modal-title font-bungee">DFK1 ROOM'S PHOTO</h5></div>
                <div class="modal-body text-center bg-light">
                    <img src="https://media.architecturaldigest.com/photos/573489112959663327663f7d/16:9/w_2560%2Cc_limit/modern-office-spaces-01.jpg" 
                         class="img-fluid border-4 border-dark shadow" alt="Bilik DFK 1">
                </div>
                <div class="modal-footer border-0"><button class="btn btn-roblox btn-dark w-100" data-bs-dismiss="modal">CLOSE</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL 2: BORANG TEMPAHAN -->
    <div class="modal fade" id="bookingModal">
        <div class="modal-dialog text-uppercase">
            <div class="modal-content border-5 border-dark rounded-0">
                <div class="modal-header bg-primary text-white border-0"><h5 class="modal-title font-bungee">NEW BOOKING</h5></div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-6"><label class="fw-bold small">DATE:</label><input type="text" id="mDay" class="form-control fw-bold" readonly></div>
                        <div class="col-6"><label class="fw-bold small">START:</label><input type="text" id="mStart" class="form-control fw-bold" readonly></div>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small text-dark">END CLASS:</label>
                        <select id="mEnd" class="form-select border-3 border-dark fw-bold text-center"></select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">SUBJECT:</label>
                         <select id="mSubject" class="form-select border-3 border-dark fw-bold text-center">
                            <option value="" disabled selected>PILIH...</option>
                            <option value="NETWORK">NETWORK</option>
                            <option value="DATABASE">DATABASE</option>
                            <option value="IT EMERGING">IT EMERGING</option>
                         </select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold small">LECTURER:</label>
                        <input type="text" id="mLecturer" class="form-control border-2 border-dark" placeholder="NAMA LECTURER">
                    </div>
                </div>
                <div class="modal-footer border-0"><button class="btn btn-roblox btn-success w-100 py-2 fs-5" onclick="processBooking()">PROCEED</button></div>
            </div>
        </div>
    </div>

    <!-- MODAL 3: INFO & CANCEL -->
    <div class="modal fade" id="infoModal">
        <div class="modal-dialog text-uppercase">
            <div class="modal-content border-5 border-dark rounded-0 text-center">
                <div class="modal-header bg-dark text-white border-0"><h5 class="modal-title font-bungee w-100">INFORMATION</h5></div>
                <div class="modal-body py-4">
                    <h2 class="font-bungee text-danger mb-0" id="infoBooker">NAME:</h2>
                    <div class="text-start bg-light p-3 border-2 border-dark mt-3">
                        <p class="mb-1"><strong>SUBJECT:</strong> <span id="infoSubject">---</span></p>
                        <p class="mb-1"><strong>LECTURER:</strong> <span id="infoLecturer">---</span></p>
                        <p class="mb-0"><strong>TIME:</strong> <span id="infoTimeRange">---</span></p>
                    </div>
                    <button class="btn btn-roblox btn-danger w-100 mt-4 py-3 fs-5" onclick="cancelBooking()">CANCEL BOOKING</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let curDay = ""; let curStartIdx = 0; let loggedInUser = "ISMA";
        let bookingData = {}; let currentActiveSlot = "";

        function showRoomPhoto() { new bootstrap.Modal(document.getElementById('photoModal')).show(); }

        function handleSlotClick(day, time) {
            const slotKey = day + "-" + time.replace(/[: ]/g, '');
            currentActiveSlot = slotKey;

            if (bookingData[slotKey]) {
                const data = bookingData[slotKey];
                document.getElementById('infoBooker').innerText = data.booker;
                document.getElementById('infoSubject').innerText = data.subject;
                document.getElementById('infoLecturer').innerText = data.lecturer;
                document.getElementById('infoTimeRange').innerText = data.startTime + " - " + data.endTime;
                new bootstrap.Modal(document.getElementById('infoModal')).show();
            } else {
                curDay = day; curStartIdx = times.indexOf(time);
                document.getElementById('mDay').value = day;
                document.getElementById('mStart').value = time;
                const select = document.getElementById('mEnd');
                select.innerHTML = "";
                for (let i = curStartIdx + 1; i < times.length; i++) {
                    let opt = document.createElement('option');
                    opt.value = times[i]; opt.innerHTML = times[i];
                    select.appendChild(opt);
                }
                new bootstrap.Modal(document.getElementById('bookingModal')).show();
            }
        }

        function processBooking() {
            const endVal = document.getElementById('mEnd').value;
            const subVal = document.getElementById('mSubject').value;
            const lecVal = document.getElementById('mLecturer').value;
            if(!subVal || !lecVal || !endVal) { alert("PLEASE FILL ALL FIELDS!"); return; }

            const groupID = Date.now();
            const endIdx = times.indexOf(endVal);

            times.forEach((time, idx) => {
                if (idx >= curStartIdx && idx < endIdx) {
                    const key = curDay + "-" + time.replace(/[: ]/g, '');
                    bookingData[key] = {
                        booker: loggedInUser, subject: subVal, lecturer: lecVal, 
                        startTime: times[curStartIdx], endTime: endVal, group: groupID
                    };
                    const cell = document.getElementById(key);
                    cell.classList.remove('slot-available');
                    cell.classList.add('slot-booked');
                    cell.innerText = "BOOKED";
                }
            });
            bootstrap.Modal.getInstance(document.getElementById('bookingModal')).hide();
        }

        function cancelBooking() {
            if (!confirm("DO YOU WANT TO CANCEL THIS?")) return;
            const targetGroup = bookingData[currentActiveSlot].group;
            Object.keys(bookingData).forEach(key => {
                if (bookingData[key].group === targetGroup) {
                    const cell = document.getElementById(key);
                    cell.classList.remove('slot-booked');
                    cell.classList.add('slot-available');
                    cell.innerText = "AVAILABLE";
                    delete bookingData[key];
                }
            });
            bootstrap.Modal.getInstance(document.getElementById('infoModal')).hide();
        }
    </script>
</body>
</html>
